# PostgreSQL cho dev local — database `ctgroup`, user/pass `postgres`/`postgres`
# Host port 5433 tránh trùng PostgreSQL cài sẵn trên Windows (thường dùng 5432).
# Chạy: docker compose -f docker-compose.dev.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: ctgroup-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ctgroup
    volumes:
      - ctgroup_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ctgroup"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  ctgroup_pgdata:
