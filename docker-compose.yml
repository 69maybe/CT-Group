services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.single
    ports:
      - "3000:3000"
      - "5000:5000"
      - "5432:5432"
    environment:
      - DB_HOST=localhost
      - DB_PORT=5432
      - DB_NAME=greenlife
      - DB_USER=postgres
      - DB_PASSWORD=postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
