app = "greenlife-backend"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"
  context = "."

[env]
  PORT = "5000"

[[services]]
  internal_port = 5000
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.http_checks]]
    path = "/"
    interval = "15s"
    timeout = "10s"
    grace_period = "60s"  
[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
