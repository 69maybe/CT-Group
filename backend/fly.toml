# fly.toml app configuration file generated for greenlife-backend on 2026-04-11T22:19:46+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'greenlife-backend'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '5000'

[[services]]
  protocol = 'tcp'
  internal_port = 5000

  [[services.ports]]
    port = 80
    handlers = ['http']

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[deploy]
  strategy = "immediate"
