services:
  - type: web
    name: greenlife-backend
    env: java
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/greenlife-backend-1.0.0.jar
    plan: free
    region: singapore
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: "86400000"
      - key: CORS_ORIGINS
        value: "*"
