services:
  - type: web
    name: greenlife-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    plan: starter
    region: singapore
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: greenlife-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: "86400000"
      - key: CORS_ORIGINS
        value: "*"

databases:
  - name: greenlife-db
    plan: starter
    region: singapore
    databaseName: greenlife
    ipAllowList: []
