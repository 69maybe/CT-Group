# CT GROUP API — cấu hình chung
# Local: mặc định profile dev (Postgres Docker: docker-compose.dev.yml)
# Production: đặt SPRING_PROFILES_ACTIVE=prod và biến PGHOST, PGPORT, PGDATABASE, DB_USER, DB_PASSWORD, CORS_ORIGINS, JWT_SECRET

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  application:
    name: ctgroup-api

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# JWT (prod: đặt JWT_SECRET)
jwt:
  secret: ${JWT_SECRET:super-secret-jwt-key-change-in-production-must-be-at-least-256-bits}
  access-token-expiration: ${JWT_ACCESS_EXPIRATION:900000}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# CORS — profile dev/prod ghi đè chi tiết
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

logging:
  level:
    com.ctgroup: DEBUG
    org.springframework.security: INFO
