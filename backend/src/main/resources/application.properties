# Server Configuration
server.port=${PORT:5000}

# Database Configuration
spring.datasource.url=jdbc:postgresql://${DATABASE_HOST:localhost}:5432/postgres?sslmode=require&sslcompression=0
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres123}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-lifetime=1800000
spring.datasource.hikari.minimum-idle=2

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=${JWT_SECRET:super-secret-jwt-key-change-in-production-must-be-at-least-256-bits}
jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:900000}
jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# CORS Configuration
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}
