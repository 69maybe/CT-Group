# Profile prod — bắt buộc biến môi trường (Railway / VPS)
server:
  port: ${PORT:5000}
  address: 0.0.0.0

spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=require
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-lifetime: 1800000
      minimum-idle: 2

  jpa:
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

cors:
  allowed-origins: ${CORS_ORIGINS:https://greenlife-food-production.up.railway.app}
